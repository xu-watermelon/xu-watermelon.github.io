pan><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br><span class="line">110</span><br><span class="line">111</span><br><span class="line">112</span><br></pre></td><td class="code"><pre><code class="hljs c++"><span class="hljs-meta"># <span class="hljs-keyword">include</span> <span class="hljs-string">&lt;iostream&gt;</span></span><br><span class="hljs-keyword">using</span> <span class="hljs-keyword">namespace</span> std;<br><span class="hljs-meta"># <span class="hljs-keyword">include</span> <span class="hljs-string">&lt;vector&gt;</span></span><br><span class="hljs-meta"># <span class="hljs-keyword">include</span> <span class="hljs-string">&lt;map&gt;</span></span><br><span class="hljs-meta">#<span class="hljs-keyword">include</span> <span class="hljs-string">&lt;cstdlib&gt;</span></span><br><span class="hljs-meta"># <span class="hljs-keyword">include</span> <span class="hljs-string">&lt;ctime&gt;</span></span><br><br><br><span class="hljs-comment">//</span><br><span class="hljs-comment">//本程序思路:首先创建一个Worker类,然后创建一个vector容器,用来临时存放Worker的数据</span><br><span class="hljs-comment">//然后,在createWorker中创建员工,并通过rand来产生随机数工资,接着在setGroup中,再次使用rand产生</span><br><span class="hljs-comment">//0-2的随机数用来代替部门,然后将key和从vector中提出的数据一起存入multimap中去.</span><br><span class="hljs-comment">//multimap存入数据后就会自动排序,所以他们会按照部门的编号,相同编号的在一起,</span><br><span class="hljs-comment">//然后就是输出multimap中的内容了,首先要确定每个部门的起点,用一个迭加器来接收,但是此时还不能确定</span><br><span class="hljs-comment">//此部门的end在哪,所以需要使用count来确定此部门的终点,最终就可以按部门将所有员工输出了 </span><br><br><br><br><br><br><span class="hljs-comment">// cehua 0</span><br><span class="hljs-comment">// meishu 1</span><br><span class="hljs-comment">// kaifa 2</span><br><br><br><span class="hljs-keyword">class</span> <span class="hljs-title class_">Worker</span><br>&#123;<br><br><span class="hljs-keyword">public</span>:<br>	string m_name;<br>	<span class="hljs-type">int</span> m_salary;<br><br>	<br>&#125;;<br><br><br><span class="hljs-comment">//创建员工,并随机生成10000-19999的工资 </span><br><span class="hljs-function"><span class="hljs-type">void</span> <span class="hljs-title">creatWorker</span><span class="hljs-params">(vector&lt;Worker&gt;&amp;v)</span></span><br><span class="hljs-function"></span>&#123;<br>	<br>	string setname=<span class="hljs-string">&quot;ABCDEFGHIJ&quot;</span>;<br>	<span class="hljs-keyword">for</span>(<span class="hljs-type">int</span> i=<span class="hljs-number">0</span>;i&lt;<span class="hljs-number">10</span>;++i)<br>	&#123;<br>		Worker worker;<br>		worker.m_name=<span class="hljs-string">&quot;员工&quot;</span>;<br>		worker.m_name+=setname[i];<br>		worker.m_salary=<span class="hljs-built_in">rand</span>()%<span class="hljs-number">10000</span><span class="hljs-number">+10000</span>;<br>		v.<span class="hljs-built_in">push_back</span>(worker); <br>		<br>	&#125;<br>	<br>	<br>&#125;<br><br><span class="hljs-comment">//设置分组,随机分配部门 </span><br><span class="hljs-function"><span class="hljs-type">void</span> <span class="hljs-title">setGroup</span><span class="hljs-params">(vector&lt;Worker&gt;&amp;v,multimap&lt;<span class="hljs-type">int</span>,Worker&gt;&amp;m)</span></span><br><span class="hljs-function"></span>&#123;<br>	<br>	<br>	<span class="hljs-keyword">for</span>(vector&lt;Worker&gt;::iterator it=v.<span class="hljs-built_in">begin</span>();it!=v.<span class="hljs-built_in">end</span>();++it)<br>	&#123;<br>		<span class="hljs-type">int</span> deptId=<span class="hljs-built_in">rand</span>()%<span class="hljs-number">3</span>;<span class="hljs-comment">//产生从0-2的随机数	</span><br>		m.<span class="hljs-built_in">insert</span>(<span class="hljs-built_in">pair</span>&lt;<span class="hljs-type">int</span>,Worker&gt;(deptId,*it));		<br>	&#125;<br>	<br>&#125;<br><br><span class="hljs-comment">//按照分组来打印员工信息 </span><br><span class="hljs-function"><span class="hljs-type">void</span> <span class="hljs-title">printGroupWorker</span><span class="hljs-params">(multimap&lt;<span class="hljs-type">int</span>,Worker&gt;m)</span></span><br><span class="hljs-function"></span>&#123;<br><br><span class="hljs-comment">//相同部门的人的key值是相同的 </span><br><span class="hljs-comment">//可以利用find()来查找各个部门的起始位置,然后使用count获得各个部门的个数,来确定结束位置</span><br> <span class="hljs-keyword">for</span>(<span class="hljs-type">int</span> i=<span class="hljs-number">0</span>;i&lt;<span class="hljs-number">3</span>;++i)<br>&#123;	multimap&lt;<span class="hljs-type">int</span>,Worker&gt;::iterator pos=m.<span class="hljs-built_in">find</span>(i);<span class="hljs-comment">//因为find返回的是迭加器,所以使用迭加器来接收</span><br> 	<span class="hljs-type">int</span> num=m.<span class="hljs-built_in">count</span>(i);<span class="hljs-comment">//使用count来获得数量</span><br>	 <span class="hljs-type">int</span> dex=<span class="hljs-number">0</span>;<br>	<span class="hljs-keyword">if</span>(i==<span class="hljs-number">0</span>)<br>	cout&lt;&lt;<span class="hljs-string">&quot;策划组:&quot;</span>&lt;&lt;endl;<br>	<span class="hljs-keyword">else</span> <span class="hljs-keyword">if</span>(i==<span class="hljs-number">1</span>)<br>	cout&lt;&lt;<span class="hljs-string">&quot;美术组:&quot;</span>&lt;&lt;endl;<br>	<span class="hljs-keyword">else</span> <span class="hljs-keyword">if</span>(i==<span class="hljs-number">2</span>)<br>	cout&lt;&lt;<span class="hljs-string">&quot;开发组:&quot;</span>&lt;&lt;endl;<br>	<span class="hljs-keyword">for</span>(;pos!=m.<span class="hljs-built_in">end</span>()&amp;&amp;dex&lt;num;pos++,dex++)<br>	cout&lt;&lt;<span class="hljs-string">&quot;员工姓名:&quot;</span>&lt;&lt;pos-&gt;second.m_name &lt;&lt;<span class="hljs-string">&quot;  &quot;</span>&lt;&lt;<span class="hljs-string">&quot;工资:&quot;</span>&lt;&lt;pos-&gt; second.m_salary&lt;&lt;endl;<br><br>&#125;<br>&#125; <br><br><br><br><span class="hljs-function"><span class="hljs-type">int</span> <span class="hljs-title">main</span> <span class="hljs-params">()</span></span><br><span class="hljs-function"></span>&#123;<br>	<span class="hljs-built_in">srand</span>((<span class="hljs-type">unsigned</span> <span class="hljs-type">int</span>)<span class="hljs-built_in">time</span>(<span class="hljs-literal">NULL</span>));<br>	vector&lt;Worker&gt;vW;<br>	<br>	<span class="hljs-built_in">creatWorker</span>(vW);<br>	<br>	multimap&lt;<span class="hljs-type">int</span>,Worker&gt;mW;<br>	<br>	<span class="hljs-built_in">setGroup</span>(vW,mW);<br>	<br><span class="hljs-comment">//	test code</span><br>	<br><span class="hljs-comment">//	for(vector&lt;Worker&gt;::iterator it=vW.begin();it!=vW.end();++it)</span><br><span class="hljs-comment">//	&#123;</span><br><span class="hljs-comment">//		cout&lt;&lt;it-&gt;m_name&lt;&lt;&quot; &quot;&lt;&lt;it-&gt;m_salary&lt;&lt;endl;</span><br><span class="hljs-comment">//	 &#125; </span><br>	<span class="hljs-built_in">printGroupWorker</span>(mW);<br>	<span class="hljs-built_in">system</span>(<span class="hljs-string">&quot;pause&quot;</span>);<br>	<span class="hljs-keyword">return</span> <span class="hljs-number">0</span> ;<br> &#125; <br></code></pre></td></tr></table></figure>

    window.tocbot.init(Object.assign({

      linkClass       : 'tocbot-link',

      listClass       : 'tocbot-list',
      isCollapsedClass: 'tocbot-is-collapsed',
      collapsibleClass: 'tocbot-is-collapsible',
      scrollSmooth    : true,
      includeTitleTags: true,
      headingsOffset  : -boardTop,
    }, CONFIG.toc));
    if (toc.find('.toc-list-item').length > 0) {
      toc.css('visibility', 'visible');
    }

    Fluid.events.registerRefreshCallback(function() {
      if ('tocbot' in window) {
        tocbot.refresh();
        var toc = jQuery('#toc');
        if (toc.length === 0 || !tocbot) {
          return;
        }
        if (toc.find('.toc-list-item').length > 0) {
          toc.css('visibility', 'visible');
        }
      }
    });
  });

    }
    var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
    var res = [];
    for (var item of el) {
      res.push('.markdown-body > ' + item.trim());
    }
    if (CONFIG.anchorjs.placement === 'left') {
      window.anchors.options.class = 'anchorjs-link-left';
    }
    window.anchors.add(res.join(', '));

    Fluid.events.registerRefreshCallback(function() {
      if ('anchors' in window) {
        anchors.removeAll();
        var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');

        }
        anchors.add(res.join(', '));
      }
    });
  });
